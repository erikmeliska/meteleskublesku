services:
  meteleskublesku:
    container_name: meteleskublesku
    build: .
    volumes:
      - ./data:/app/data
      - ./cache:/app/.cache
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    networks:
      - caddy-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  caddy-net:
    external: true
